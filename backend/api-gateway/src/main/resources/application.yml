spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        # Auth routes (no authentication required)
        - id: auth-service
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: user-service-cb
                fallbackUri: forward:/fallback

        # User routes (authenticated)
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**,/api/family-members/**,/api/statistics/users/**,/api/profile/**,/api/permissions/**,/api/password/**,/api/verification/**
          filters:
            - AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: user-service-cb
                fallbackUri: forward:/fallback

        # Appointment routes (authenticated)
        - id: appointment-service
          uri: lb://appointment-service
          predicates:
            - Path=/api/appointments,/api/appointments/**,/api/schedules/**,/api/notifications/**,/api/statistics/appointments/**,/api/statistics/aggregate/**,/api/clinics,/api/clinics/**,/api/rooms,/api/rooms/**,/api/services,/api/services/**,/api/reports/**
          filters:
            - AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: appointment-service-cb
                fallbackUri: forward:/fallback

        # Medical routes (authenticated)
        - id: medical-service
          uri: lb://medical-service
          predicates:
            - Path=/api/medical-records/**,/api/prescriptions/**,/api/medications/**,/api/health-metrics/**,/api/ai-analyses/**,/api/files/**,/api/statistics/medical/**
          filters:
            - AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: medical-service-cb
                fallbackUri: forward:/fallback

        # Consultation routes (authenticated)
        - id: consultation-service
          uri: lb://consultation-service
          predicates:
            - Path=/api/consultations/**,/api/messages/**
          filters:
            - AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: consultation-service-cb
                fallbackUri: forward:/fallback

        # Payment routes (authenticated)
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**
          filters:
            - AuthenticationFilter
            - name: CircuitBreaker
              args:
                name: payment-service-cb
                fallbackUri: forward:/fallback

        # WebSocket route
        - id: websocket-service
          uri: lb:ws://consultation-service
          predicates:
            - Path=/ws/**

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
        - AddRequestHeader=X-Gateway-Source, api-gateway
        # Preserve Authorization header for downstream services
        - name: PreserveHostHeader

      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins:
              - "http://localhost:3000"
              - "http://127.0.0.1:3000"
              - "http://localhost:3001"
              - "http://127.0.0.1:3001"
              - "http://localhost:4200"
              - "http://localhost:5173"
              - "http://127.0.0.1:5173"
              - "http://localhost:4173"
              - "http://127.0.0.1:4173"
              - "http://localhost:4174"
              - "http://127.0.0.1:4174"
              - "http://localhost:8080"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            # Explicitly allow Authorization and other required headers
            allowed-headers:
              - "Authorization"
              - "Content-Type"
              - "Accept"
              - "X-Requested-With"
              - "X-Correlation-Id"
              - "X-User-Id"
              - "X-User-Email"
              - "X-User-Role"
              - "*"
            expose-headers:
              - "Authorization"
              - "X-Correlation-Id"
              - "X-User-Id"
              - "X-User-Email"
              - "X-User-Role"
            allow-credentials: true
            max-age: 3600

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: false
    fetch-registry: true
  instance:
    prefer-ip-address: true

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:dGhpc2lzYXZlcnlsb25nc2VjcmV0a2V5Zm9yand0dG9rZW5nZW5lcmF0aW9uYW5kdmFsaWRhdGlvbjEyMzQ1Njc4OTA=}

# Circuit Breaker Configuration
resilience4j:
  circuitbreaker:
    instances:
      user-service-cb:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 10s
        failure-rate-threshold: 50
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: 2s

      appointment-service-cb:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 10s
        failure-rate-threshold: 50

      medical-service-cb:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 10s
        failure-rate-threshold: 50

      consultation-service-cb:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 10s
        failure-rate-threshold: 50

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,circuitbreakers
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
  health:
    redis:
      enabled: false

# Logging
logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.clinicbooking.gateway: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{correlationId}] %logger{36} - %msg%n"
