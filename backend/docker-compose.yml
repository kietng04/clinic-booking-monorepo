version: '3.8'

services:
  # ============================================
  # Infrastructure Services
  # ============================================

  # Service Discovery - Eureka Server
  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: clinic_eureka
    ports:
      - "8761:8761"
    networks:
      - clinic-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # Message Broker - Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: clinic_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - clinic-network
    restart: unless-stopped

  # Message Broker - Kafka
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: clinic_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - clinic-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server=localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ============================================
  # Databases - 4 PostgreSQL instances
  # ============================================

  # User Service Database
  postgres-user:
    image: postgres:16-alpine
    container_name: clinic_postgres_user
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user_service_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    networks:
      - clinic-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Appointment Service Database
  postgres-appointment:
    image: postgres:16-alpine
    container_name: clinic_postgres_appointment
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appointment_service_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_appointment_data:/var/lib/postgresql/data
    networks:
      - clinic-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Medical Service Database
  postgres-medical:
    image: postgres:16-alpine
    container_name: clinic_postgres_medical
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medical_service_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_medical_data:/var/lib/postgresql/data
    networks:
      - clinic-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Consultation Service Database
  postgres-consultation:
    image: postgres:16-alpine
    container_name: clinic_postgres_consultation
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: consultation_service_db
    ports:
      - "5436:5432"
    volumes:
      - postgres_consultation_data:/var/lib/postgresql/data
    networks:
      - clinic-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Payment Service Database
  postgres-payment:
    image: postgres:16-alpine
    container_name: clinic_postgres_payment
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payment_db
    ports:
      - "5437:5432"
    volumes:
      - postgres_payment_data:/var/lib/postgresql/data
    networks:
      - clinic-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================
  # Cache - Redis
  # ============================================

  redis:
    image: redis:7-alpine
    container_name: clinic_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - clinic-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ============================================
  # Email Service (Dev) - MailHog
  # ============================================

  mailhog:
    image: mailhog/mailhog:latest
    container_name: clinic_mailhog
    ports:
      - "1025:1025"  # SMTP port
      - "8025:8025"  # Web UI
    networks:
      - clinic-network
    restart: unless-stopped

  # ============================================
  # Microservices
  # ============================================

  # User Service
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: clinic_user_service
    ports:
      - "8081:8081"
    environment:
      POSTGRES_HOST: postgres-user
      POSTGRES_PORT: 5432
      POSTGRES_DB: user_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      EUREKA_URL: http://eureka-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dGhpc2lzYXZlcnlsb25nc2VjcmV0a2V5Zm9yand0dG9rZW5nZW5lcmF0aW9uYW5kdmFsaWRhdGlvbjEyMzQ1Njc4OTA=
      CLOUDINARY_URL: ${CLOUDINARY_URL:-}
      AVATAR_MAX_FILE_SIZE_BYTES: ${AVATAR_MAX_FILE_SIZE_BYTES:-5242880}
      AVATAR_FOLDER: ${AVATAR_FOLDER:-healthflow/avatars}
    depends_on:
      postgres-user:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - clinic-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  # Appointment Service
  appointment-service:
    build:
      context: ./appointment-service
      dockerfile: Dockerfile
    container_name: clinic_appointment_service
    ports:
      - "8082:8082"
    environment:
      POSTGRES_HOST: postgres-appointment
      POSTGRES_PORT: 5432
      POSTGRES_DB: appointment_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      EUREKA_URL: http://eureka-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres-appointment:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_healthy
    networks:
      - clinic-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  # Medical Service
  medical-service:
    build:
      context: .
      dockerfile: medical-service/Dockerfile
    container_name: clinic_medical_service
    ports:
      - "8083:8083"
    environment:
      POSTGRES_HOST: postgres-medical
      POSTGRES_PORT: 5432
      POSTGRES_DB: medical_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      EUREKA_URL: http://eureka-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres-medical:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_healthy
      appointment-service:
        condition: service_healthy
    networks:
      - clinic-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  # Payment Service

  # Consultation Service
  consultation-service:
    build:
      context: .
      dockerfile: consultation-service/Dockerfile
    container_name: clinic_consultation_service
    ports:
      - "8085:8085"
    environment:
      POSTGRES_HOST: postgres-consultation
      POSTGRES_PORT: 5432
      POSTGRES_DB: consultation_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      EUREKA_URL: http://eureka-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dGhpc2lzYXZlcnlsb25nc2VjcmV0a2V5Zm9yand0dG9rZW5nZW5lcmF0aW9uYW5kdmFsaWRhdGlvbjEyMzQ1Njc4OTA=
    depends_on:
      postgres-consultation:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_healthy
    networks:
      - clinic-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8085/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped
  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: clinic_payment_service
    ports:
      - "8084:8084"
    environment:
      POSTGRES_HOST: postgres-payment
      POSTGRES_PORT: 5432
      POSTGRES_DB: payment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      EUREKA_URL: http://eureka-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Momo Payment Gateway Credentials (use environment variables for security)
      MOMO_PARTNER_CODE: ${MOMO_PARTNER_CODE:-MOMOBKUN20180529}
      MOMO_ACCESS_KEY: ${MOMO_ACCESS_KEY:-klm05TvNBzhg7h7j}
      MOMO_SECRET_KEY: ${MOMO_SECRET_KEY:-at67qH6mk8w5Y1nAyMoYKMWACiEi2bsa}
      MOMO_ENDPOINT: ${MOMO_ENDPOINT:-https://test-payment.momo.vn}
      # Payment Service URLs (updated by deployment environment)
      PAYMENT_REDIRECT_URL: ${PAYMENT_REDIRECT_URL:-http://localhost:3000/payment/result}
      PAYMENT_IPN_URL: ${PAYMENT_IPN_URL:-http://api-gateway:8080/api/payments/momo/callback}
    depends_on:
      postgres-payment:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_healthy
      appointment-service:
        condition: service_healthy
    networks:
      - clinic-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  # ============================================
  # API Gateway
  # ============================================

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: clinic_api_gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      JWT_SECRET: dGhpc2lzYXZlcnlsb25nc2VjcmV0a2V5Zm9yand0dG9rZW5nZW5lcmF0aW9uYW5kdmFsaWRhdGlvbjEyMzQ1Njc4OTA=
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - clinic-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped

# ============================================
# Networks
# ============================================

networks:
  clinic-network:
    driver: bridge
    name: clinic-microservices-network

# ============================================
# Volumes
# ============================================

volumes:
  # Kafka & Zookeeper
  zookeeper_data:
    name: clinic_zookeeper_data
  zookeeper_logs:
    name: clinic_zookeeper_logs
  kafka_data:
    name: clinic_kafka_data

  # PostgreSQL Databases
  postgres_user_data:
    name: clinic_postgres_user_data
  postgres_appointment_data:
    name: clinic_postgres_appointment_data
  postgres_medical_data:
    name: clinic_postgres_medical_data
  postgres_consultation_data:
    name: clinic_postgres_consultation_data
  postgres_payment_data:
    name: clinic_postgres_payment_data

  # Redis
  redis_data:
    name: clinic_redis_data
