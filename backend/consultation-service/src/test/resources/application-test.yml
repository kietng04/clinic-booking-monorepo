spring:
  application:
    name: consultation-service-test

  # H2 In-Memory Database for Testing
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  # Disable Flyway for tests
  flyway:
    enabled: false

  # Disable Kafka for tests
  kafka:
    enabled: false

  # Disable Redis for tests
  data:
    redis:
      repositories:
        enabled: false

  # Disable Eureka for tests
  cloud:
    discovery:
      enabled: false

# Disable security for tests (can be overridden in specific test classes)
security:
  enabled: false

# JWT Configuration (for test tokens if needed)
jwt:
  secret: test-secret-key-for-testing-purposes-only-minimum-256-bits-required
  expiration: 86400000

# Consultation Configuration
consultation:
  default-fee: 200000

# Logging
logging:
  level:
    com.clinicbooking.consultationservice: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: DEBUG
