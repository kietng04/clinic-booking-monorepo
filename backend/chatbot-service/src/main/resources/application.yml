spring:
  application:
    name: chatbot-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5438}/${POSTGRES_DB:chatbot_service_db}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8086
  error:
    include-message: always
    include-binding-errors: always

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
  endpoint:
    health:
      show-details: always

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

ai:
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
    base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
    max-output-tokens: ${GEMINI_MAX_OUTPUT_TOKENS:256}
    temperature: ${GEMINI_TEMPERATURE:0.1}
    answer-max-output-tokens: ${GEMINI_ANSWER_MAX_OUTPUT_TOKENS:512}
    answer-temperature: ${GEMINI_ANSWER_TEMPERATURE:0.2}
    retry:
      max-attempts: ${GEMINI_RETRY_MAX_ATTEMPTS:3}
      backoff-ms: ${GEMINI_RETRY_BACKOFF_MS:800}
    timeout:
      connect-ms: ${GEMINI_CONNECT_TIMEOUT_MS:10000}
      read-ms: ${GEMINI_READ_TIMEOUT_MS:30000}

  classifier:
    confidence-threshold: ${CLASSIFIER_CONFIDENCE_THRESHOLD:0.34}
    fallback-intent-id: ${CLASSIFIER_FALLBACK_INTENT_ID:UNKNOWN}

  rag:
    top-k: ${RAG_TOP_K:3}
    min-score: ${RAG_MIN_SCORE:0.08}
    rerank-candidate-limit: ${RAG_RERANK_CANDIDATE_LIMIT:8}
    confidence:
      min-top-score: ${RAG_CONFIDENCE_MIN_TOP_SCORE:0.55}
      min-score-gap: ${RAG_CONFIDENCE_MIN_SCORE_GAP:0.05}
    expansion:
      enabled: ${RAG_QUERY_EXPANSION_ENABLED:true}
      max-queries: ${RAG_QUERY_EXPANSION_MAX_QUERIES:4}
    vector:
      min-score: ${RAG_VECTOR_MIN_SCORE:0.2}
    evaluation:
      dataset-path: ${RAG_EVALUATION_DATASET_PATH:rag/default-evaluation-dataset.json}
    knowledge-path: ${RAG_KNOWLEDGE_PATH:knowledge/default-knowledge-base.json}
    pgvector:
      enabled: ${RAG_PGVECTOR_ENABLED:true}
      auto-sync: ${RAG_PGVECTOR_AUTO_SYNC:true}
  embedding:
    enabled: ${EMBEDDING_ENABLED:true}
    model: ${EMBEDDING_MODEL:gemini-embedding-001}
    dimensions: ${EMBEDDING_DIMENSIONS:3072}

logging:
  level:
    root: INFO
    com.clinicbooking.chatbotservice: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  show-actuator: true

services:
  user-service:
    url: ${SERVICES_USER_SERVICE_URL:http://localhost:8081}
  appointment-service:
    url: ${SERVICES_APPOINTMENT_SERVICE_URL:http://localhost:8082}

chatbot:
  doctor-lookup:
    max-results: ${CHATBOT_DOCTOR_LOOKUP_MAX_RESULTS:3}
    fetch-size: ${CHATBOT_DOCTOR_LOOKUP_FETCH_SIZE:100}
  clinic-directory:
    max-results: ${CHATBOT_CLINIC_DIRECTORY_MAX_RESULTS:3}
  service-catalog:
    fetch-size: ${CHATBOT_SERVICE_CATALOG_FETCH_SIZE:200}
    max-results: ${CHATBOT_SERVICE_CATALOG_MAX_RESULTS:5}
