<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Xác thực Email</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
    <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 30px; text-align: center; border-radius: 10px 10px 0 0;">
        <h1 style="color: white; margin: 0;">Xác thực Email</h1>
    </div>

    <div style="background: #f9f9f9; padding: 30px; border-radius: 0 0 10px 10px;">
        <h2 style="color: #667eea;">Xin chào, <span th:text="${userName}">User</span>!</h2>

        <p>Vui lòng xác thực địa chỉ email của bạn bằng cách nhấn vào nút bên dưới:</p>

        <div style="text-align: center; margin: 30px 0;">
            <a th:href="${verificationUrl}" style="background: #28a745; color: white; padding: 15px 30px; text-decoration: none; border-radius: 5px; font-weight: bold;">
                Xác thực Email
            </a>
        </div>

        <p style="color: #666; font-size: 14px;">
            Nếu bạn không đăng ký tài khoản tại Clinic Booking, vui lòng bỏ qua email này.
        </p>

        <p style="color: #666; font-size: 14px;">
            Link xác thực sẽ hết hạn sau 24 giờ.
        </p>

        <hr style="border: none; border-top: 1px solid #ddd; margin: 20px 0;">

        <p style="color: #999; font-size: 12px; text-align: center;">
            © 2024 Clinic Booking. All rights reserved.
        </p>
    </div>
</body>
</html>
