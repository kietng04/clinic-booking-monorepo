spring:
  application:
    name: payment-service-test

  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        show_sql: false
    show-sql: false

  flyway:
    enabled: false

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      auto-offset-reset: earliest
      group-id: payment-service-test
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: none

  security:
    user:
      name: test
      password: test

logging:
  level:
    root: INFO
    com.clinicbooking.paymentservice: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

payment:
  redirect-url: http://localhost:8080/payment/callback
  ipn-url: http://localhost:8080/payment/ipn

momo:
  endpoint: http://test.momo.vn
  partner-code: TEST_PARTNER
  access-key: TEST_ACCESS_KEY
  secret-key: TEST_SECRET_KEY
  redirect-url: http://localhost:8080/payment/callback
  ipn-url: http://localhost:8080/payment/ipn

eureka:
  client:
    enabled: false
